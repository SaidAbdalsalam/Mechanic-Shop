services:
  # ══════════════════════════════════════════════════
  #  SQL SERVER
  # ══════════════════════════════════════════════════
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mechanic_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD} 
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -Q 'SELECT 1' -No" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ══════════════════════════════════════════════════
  #  REDIS
  # ══════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: mechanic_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ══════════════════════════════════════════════════
  #  SEQ (Structured Logging UI)
  # ══════════════════════════════════════════════════
  seq:
    image: datalust/seq:latest
    container_name: mechanic_seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true 
    ports:
      - "5341:5341"   
      - "8081:80"    
    volumes:
      - seq_data:/data
    networks:
      - backend
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  #  JAEGER (OpenTelemetry Traces + UI)
  # ══════════════════════════════════════════════════
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: mechanic_jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "4317:4317"   
      - "4318:4318"   
      - "16686:16686" 
    networks:
      - backend
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  #  PROMETHEUS (الطبقة التي كانت ناقصة 🎯)
  # ══════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: mechanic_prometheus
    volumes:
      - ./containers/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - backend
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  #  GRAFANA 
  # ══════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: mechanic_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=YourStrongPwd 
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  #  MECHANICSHOP API
  # ══════════════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: src/MechanicShop.Api/Dockerfile
      args:
        BUILD_CONFIGURATION: Release
    image: mechanicshop-api:latest
    container_name: mechanic_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=MechanicShopDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True;
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__Issuer=localhost
      - JwtSettings__Audience=localhost
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__TokenExpirationInMinutes=60

      # Business AppSettings
      - AppSettings__StoreTimeZoneId=Egypt Standard Time
      - AppSettings__OpeningTime=00:00:00
      - AppSettings__ClosingTime=23:59:59
      - AppSettings__MaxSpots=4
      - AppSettings__MinimumAppointmentDurationInMinutes=30
      - AppSettings__CorsPolicyName=MechanicShop
      - AppSettings__AllowedOrigins__0=https://localhost:7094
      - AppSettings__AllowedOrigins__1=http://mechanicshop-app
      - AppSettings__DefaultPageNumber=1
      - AppSettings__DefaultPageSize=10
      - AppSettings__LocalCacheExpirationInMins=30
      - AppSettings__DistributedCacheExpirationMins=60
      - AppSettings__BookingCancellationThresholdMinutes=15
      - AppSettings__OverdueBookingCleanupFrequencyMinutes=3

      - Serilog__WriteTo__0__Name=Console
      - Serilog__WriteTo__1__Name=Seq
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=MechanicShop

    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
      jaeger:
        condition: service_started
    networks:
      - backend
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

networks:
  backend:
    driver: bridge
    name: mechanic_backend

volumes:
  sqlserver_data:
    name: mechanic_sqlserver_data
  redis_data:
    name: mechanic_redis_data
  seq_data:
    name: mechanic_seq_data
  prometheus_data:      
    name: mechanic_prometheus_data
  grafana_data:        
    name: mechanic_grafana_data